<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>BioAttend – SIT Tumkur</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:      #050a1a;
  --card:    #0d1530;
  --inp:     #111d3a;
  --tab-act: #1a2a52;
  --acc:     #4f6ef7;
  --acc2:    #7c3aed;
  --text:    #e8eaf6;
  --muted:   #6b7db3;
  --border:  #1e2f5a;
  --danger:  #ef4444;
  --success: #22c55e;
  --warn:    #f59e0b;
  --rad:     14px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Sora',sans-serif;background:var(--bg);min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:16px;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 50% at 20% -10%,rgba(79,110,247,.18) 0%,transparent 60%),radial-gradient(ellipse 60% 40% at 80% 110%,rgba(124,58,237,.14) 0%,transparent 55%);pointer-events:none;z-index:0}

/* ── Card ── */
.card{position:relative;width:100%;max-width:440px;background:var(--card);border:1px solid var(--border);border-radius:24px;overflow:hidden;box-shadow:0 32px 80px rgba(0,0,0,.6);z-index:1;animation:slideUp .5s cubic-bezier(.22,1,.36,1) both;margin:0 auto}
@keyframes slideUp{from{opacity:0;transform:translateY(28px)}to{opacity:1;transform:translateY(0)}}

/* ── Header ── */
.header{padding:28px 24px 18px;background:linear-gradient(160deg,#0d1a40 0%,#080f2a 100%);text-align:center}
.logo-ring{width:58px;height:58px;margin:0 auto 12px;border-radius:50%;background:linear-gradient(135deg,var(--acc),var(--acc2));display:flex;align-items:center;justify-content:center;box-shadow:0 0 28px rgba(79,110,247,.5);animation:pulse 3s ease-in-out infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 18px rgba(79,110,247,.4)}50%{box-shadow:0 0 36px rgba(79,110,247,.7)}}
.logo-ring svg{width:28px;height:28px;fill:#fff}
.brand{font-size:21px;font-weight:700;color:#fff;letter-spacing:-.3px}
.tagline{font-size:11px;color:var(--muted);margin-top:3px;letter-spacing:.8px;text-transform:uppercase}
.college-badge{display:inline-flex;align-items:center;gap:5px;margin-top:8px;padding:3px 10px;background:rgba(79,110,247,.15);border:1px solid rgba(79,110,247,.3);border-radius:20px;font-size:10.5px;color:var(--acc);letter-spacing:.3px}

/* ── Tabs ── */
.tabs{display:grid;grid-template-columns:repeat(3,1fr);border-bottom:1px solid var(--border)}
.tab-btn{padding:12px 0;background:transparent;border:none;cursor:pointer;font-family:'Sora',sans-serif;font-size:12px;font-weight:500;color:var(--muted);transition:color .2s,background .2s;position:relative}
.tab-btn.active{color:var(--acc);background:var(--tab-act)}
.tab-btn.active::after{content:'';position:absolute;bottom:0;left:12px;right:12px;height:2px;background:linear-gradient(90deg,var(--acc),var(--acc2));border-radius:2px 2px 0 0}

/* ── Panes ── */
.form-body{padding:20px 20px 24px}
.pane{display:none}
.pane.active{display:block;animation:fadeIn .3s ease both}
@keyframes fadeIn{from{opacity:0;transform:translateX(10px)}to{opacity:1;transform:translateX(0)}}

/* ── Fields ── */
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.field{margin-bottom:12px}
.field label{display:block;font-size:10px;font-weight:600;letter-spacing:.9px;text-transform:uppercase;color:var(--muted);margin-bottom:5px}
.field label .req{color:var(--acc)}
.field input,.field select{width:100%;padding:10px 13px;background:var(--inp);border:1px solid var(--border);border-radius:var(--rad);color:var(--text);font-family:'Sora',sans-serif;font-size:13.5px;outline:none;transition:border-color .2s,box-shadow .2s}
.field input::placeholder{color:var(--muted);font-size:12.5px}
.field input:focus,.field select:focus{border-color:var(--acc);box-shadow:0 0 0 3px rgba(79,110,247,.14)}
.field select option{background:#1a2a52}
.field input[type=date]::-webkit-calendar-picker-indicator{filter:invert(.4)}

/* pw toggle */
.pw-wrap{position:relative}
.pw-wrap input{padding-right:40px}
.pw-eye{position:absolute;right:11px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--muted);display:flex;align-items:center;transition:color .2s}
.pw-eye:hover{color:var(--text)}

/* toggle switch */
.toggle-row{display:flex;align-items:center;justify-content:space-between;background:var(--inp);border:1px solid var(--border);border-radius:var(--rad);padding:11px 13px;margin-bottom:16px}
.toggle-row span{font-size:13px;color:var(--text)}
.toggle{position:relative;width:44px;height:24px}
.toggle input{opacity:0;width:0;height:0}
.slider{position:absolute;inset:0;background:var(--border);border-radius:24px;cursor:pointer;transition:background .3s}
.slider::before{content:'';position:absolute;width:18px;height:18px;left:3px;top:3px;background:#fff;border-radius:50%;transition:transform .3s}
.toggle input:checked+.slider{background:var(--acc)}
.toggle input:checked+.slider::before{transform:translateX(20px)}

/* buttons */
.btn{width:100%;padding:12px;border:none;border-radius:var(--rad);font-family:'Sora',sans-serif;font-size:14.5px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:opacity .2s,transform .1s,box-shadow .2s}
.btn-primary{background:linear-gradient(135deg,var(--acc),var(--acc2));color:#fff;box-shadow:0 4px 18px rgba(79,110,247,.35)}
.btn-primary:hover{opacity:.91;box-shadow:0 6px 26px rgba(79,110,247,.5)}
.btn-primary:active{transform:scale(.98)}
.btn-primary:disabled{opacity:.45;cursor:not-allowed}
.btn-secondary{background:var(--inp);border:1px solid var(--border);color:var(--muted);margin-top:10px}
.btn-secondary:not(:disabled):hover{border-color:var(--acc);color:var(--acc);background:rgba(79,110,247,.07)}
.btn-secondary:disabled{opacity:.4;cursor:not-allowed}
.btn-danger{background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.3);color:var(--danger);margin-top:8px}
.btn-danger:hover{background:rgba(239,68,68,.2)}
.btn-success{background:rgba(34,197,94,.12);border:1px solid rgba(34,197,94,.3);color:var(--success)}
.btn-success:hover{background:rgba(34,197,94,.2)}

.divider{display:flex;align-items:center;gap:10px;margin:12px 0;color:var(--muted);font-size:11px}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}
.hint{text-align:center;font-size:11px;color:var(--muted);margin-top:7px}

/* ── Info boxes ── */
.info-box{border-radius:12px;padding:11px 13px;font-size:12.5px;margin-bottom:14px;display:flex;align-items:flex-start;gap:9px}
.info-box.blue{background:rgba(79,110,247,.1);border:1px solid rgba(79,110,247,.25);color:#a5b4fc}
.info-box.green{background:rgba(34,197,94,.08);border:1px solid rgba(34,197,94,.25);color:#86efac}
.info-box.red{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.25);color:#fca5a5}
.info-box.orange{background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.25);color:#fcd34d}
.info-box svg{flex-shrink:0;margin-top:1px}

/* ── Session badge ── */
.session-card{background:rgba(34,197,94,.08);border:1px solid rgba(34,197,94,.3);border-radius:14px;padding:14px;margin-bottom:14px}
.session-card .subj{font-size:15px;font-weight:600;color:var(--success);margin-bottom:4px}
.session-card .meta{font-size:11.5px;color:var(--muted)}
.session-card .timer{font-size:20px;font-weight:700;color:var(--success);font-variant-numeric:tabular-nums;margin-top:6px}
.no-session{background:rgba(239,68,68,.06);border:1px solid rgba(239,68,68,.2);border-radius:14px;padding:14px;text-align:center;color:var(--muted);font-size:13px;margin-bottom:14px}

/* ── Attendance list ── */
.att-list{display:flex;flex-direction:column;gap:8px;max-height:280px;overflow-y:auto;margin-top:12px}
.att-item{background:var(--inp);border:1px solid var(--border);border-radius:10px;padding:10px 13px;display:flex;align-items:center;justify-content:space-between}
.att-item .name{font-size:13px;font-weight:500;color:var(--text)}
.att-item .meta{font-size:11px;color:var(--muted)}
.att-badge{font-size:10px;font-weight:600;padding:3px 8px;border-radius:20px;background:rgba(34,197,94,.15);color:var(--success);border:1px solid rgba(34,197,94,.3)}

/* ── Toast ── */
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(50px);background:#1a2a52;border:1px solid var(--acc);color:var(--text);padding:10px 20px;border-radius:40px;font-size:12.5px;opacity:0;transition:opacity .3s,transform .3s;z-index:999;white-space:nowrap;max-width:90vw;text-align:center}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#toast.error{border-color:var(--danger)}
#toast.success{border-color:var(--success)}
#toast.warn{border-color:var(--warn)}

/* ── Location status bar ── */
.loc-bar{display:flex;align-items:center;gap:7px;padding:8px 12px;border-radius:10px;font-size:11.5px;margin-bottom:12px}
.loc-bar.getting{background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.25);color:var(--warn)}
.loc-bar.ok{background:rgba(34,197,94,.08);border:1px solid rgba(34,197,94,.25);color:var(--success)}
.loc-bar.fail{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.25);color:var(--danger)}

/* ── Attendance success card ── */
.att-card{background:rgba(34,197,94,.07);border:1px solid rgba(34,197,94,.3);border-radius:14px;padding:14px 16px;margin-bottom:14px}
.att-card .att-name{font-size:15px;font-weight:600;color:var(--success);margin-bottom:6px}
.att-card .att-row{display:flex;justify-content:space-between;font-size:11.5px;color:var(--muted);padding:3px 0;border-bottom:1px solid rgba(34,197,94,.1)}
.att-card .att-row:last-child{border:none}
.att-card .att-val{color:var(--text);font-weight:500}

/* ── Exit button ── */
.btn-exit{width:100%;padding:11px;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.35);border-radius:var(--rad);color:var(--danger);font-family:'Sora',sans-serif;font-size:14px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;margin-top:10px;transition:background .2s}
.btn-exit:hover{background:rgba(239,68,68,.2)}
.btn-exit:disabled{opacity:.45;cursor:not-allowed}
.spin{display:inline-block;width:15px;height:15px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── Teacher dashboard layout ── */
.dash-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;padding-bottom:12px;border-bottom:1px solid var(--border)}
.dash-name{font-size:14px;font-weight:600;color:var(--text)}
.dash-sub{font-size:10.5px;color:var(--muted);margin-top:2px}
.dash-logout{background:none;border:1px solid var(--border);border-radius:8px;padding:4px 10px;cursor:pointer;color:var(--muted);font-size:11px;font-family:'Sora',sans-serif;transition:color .2s,border-color .2s}
.dash-logout:hover{color:var(--danger);border-color:var(--danger)}

/* ── Sub-tabs ── */
.sub-tabs{display:grid;grid-template-columns:repeat(4,1fr);background:var(--inp);border-radius:10px;padding:3px;margin-bottom:14px;gap:2px}
.sub-tab{padding:7px 0;background:transparent;border:none;cursor:pointer;font-family:'Sora',sans-serif;font-size:11px;font-weight:500;color:var(--muted);border-radius:8px;transition:all .2s}
.sub-tab.active{background:var(--tab-act);color:var(--acc)}
.sub-pane{display:none}
.sub-pane.active{display:block;animation:fadeIn .25s ease both}

/* ── Stats row ── */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px}
.stat-card{border-radius:12px;padding:10px 6px;text-align:center;border:1px solid}
.stat-card.green{background:rgba(34,197,94,.08);border-color:rgba(34,197,94,.25)}
.stat-card.red{background:rgba(239,68,68,.08);border-color:rgba(239,68,68,.25)}
.stat-card.blue{background:rgba(79,110,247,.08);border-color:rgba(79,110,247,.25)}
.stat-card.purple{background:rgba(124,58,237,.08);border-color:rgba(124,58,237,.25)}
.stat-num{font-size:18px;font-weight:700;color:var(--text);font-variant-numeric:tabular-nums}
.stat-lbl{font-size:9.5px;color:var(--muted);margin-top:2px;text-transform:uppercase;letter-spacing:.6px}

/* ── Segment control ── */
.seg-control{display:inline-flex;background:var(--inp);border-radius:8px;padding:2px;gap:2px}
.seg{padding:5px 14px;background:transparent;border:none;cursor:pointer;font-family:'Sora',sans-serif;font-size:11.5px;font-weight:500;color:var(--muted);border-radius:6px;transition:all .2s}
.seg.active{background:var(--tab-act);color:var(--acc)}

/* ── Export button ── */
.export-btn{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;background:rgba(79,110,247,.1);border:1px solid rgba(79,110,247,.3);border-radius:8px;color:var(--acc);font-size:11.5px;font-family:'Sora',sans-serif;cursor:pointer;float:right;transition:background .2s}
.export-btn:hover{background:rgba(79,110,247,.2)}

/* ── Live toggle row ── */
#live-toggle-row{display:flex;align-items:center;justify-content:space-between}

/* ── Student search ── */
#student-search{background:var(--inp);border:1px solid var(--border);border-radius:var(--rad);color:var(--text);font-family:'Sora',sans-serif;font-size:13px;padding:9px 13px;width:100%;outline:none;transition:border-color .2s}
#student-search:focus{border-color:var(--acc)}
#student-search::placeholder{color:var(--muted)}

/* ── Location pill ── */
</style>
</head>
<body>
<div class="card">

  <!-- Header -->
  <div class="header">
    <div class="logo-ring">
      <svg viewBox="0 0 24 24"><path d="M12 1C7.03 1 3 5.03 3 10c0 3.31 1.8 6.2 4.47 7.79C7.17 18.52 7 19.24 7 20v2h2v-2c0-.37.1-.72.27-1.03A8.96 8.96 0 0012 19a8.96 8.96 0 002.73-.03c.17.31.27.66.27 1.03v2h2v-2c0-.76-.17-1.48-.47-2.21C19.2 16.2 21 13.31 21 10c0-4.97-4.03-9-9-9zm0 16c-3.86 0-7-3.14-7-7s3.14-7 7-7 7 3.14 7 7-3.14 7-7 7zm0-12c-2.76 0-5 2.24-5 5h2c0-1.65 1.35-3 3-3s3 1.35 3 3h2c0-2.76-2.24-5-5-5zm0 4c-.55 0-1 .45-1 1s.45 1 1 1 1-.45 1-1-.45-1-1-1z"/></svg>
    </div>
    <div class="brand">BioAttend</div>
    <div class="tagline">Biometric Attendance System</div>
    <div class="college-badge">
      <svg width="11" height="11" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
      SIT Tumkur
    </div>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab-btn" id="tab-signin"   onclick="switchTab('signin')">Sign In</button>
    <button class="tab-btn active" id="tab-register" onclick="switchTab('register')">Register</button>
    <button class="tab-btn" id="tab-teacher"  onclick="switchTab('teacher')">Teacher</button>
  </div>

  <div class="form-body">

    <!-- ══════════════════════════════════════════
         SIGN IN PANE
    ══════════════════════════════════════════ -->
    <div class="pane" id="pane-signin">

      <!-- Location status pill -->
      <div id="loc-status-bar"></div>

      <!-- Attendance success card (shown after marking) -->
      <div id="att-success-card" style="display:none"></div>

      <div class="field">
        <label>Email</label>
        <input type="email" id="si-email" placeholder="usn@sit.ac.in"/>
      </div>
      <div class="field">
        <label>Password</label>
        <div class="pw-wrap">
          <input type="password" id="si-password" placeholder="••••••••"/>
          <button class="pw-eye" onclick="togglePw('si-password')" type="button">
            <svg width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>

      <button class="btn btn-primary" id="btn-signin" onclick="handleSignIn()">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24"><path d="M15 3h4a2 2 0 012 2v14a2 2 0 01-2 2h-4M10 17l5-5-5-5M15 12H3"/></svg>
        Sign In &amp; Mark Attendance
      </button>

      <div class="divider">or use biometric</div>

      <button class="btn btn-secondary" id="btn-bio-signin" onclick="handleBiometricSignIn()">
        <svg width="17" height="17" fill="currentColor" viewBox="0 0 24 24"><path d="M12 1C7.03 1 3 5.03 3 10c0 3.31 1.8 6.2 4.47 7.79C7.17 18.52 7 19.24 7 20v2h2v-2c0-.37.1-.72.27-1.03A8.96 8.96 0 0012 19a8.96 8.96 0 002.73-.03c.17.31.27.66.27 1.03v2h2v-2c0-.76-.17-1.48-.47-2.21C19.2 16.2 21 13.31 21 10c0-4.97-4.03-9-9-9zm0 16c-3.86 0-7-3.14-7-7s3.14-7 7-7 7 3.14 7 7-3.14 7-7 7zm0-12c-2.76 0-5 2.24-5 5h2c0-1.65 1.35-3 3-3s3 1.35 3 3h2c0-2.76-2.24-5-5-5zm0 4c-.55 0-1 .45-1 1s.45 1 1 1 1-.45 1-1-.45-1-1-1z"/></svg>
        Sign in with Fingerprint / Face ID
      </button>
    </div>

    <!-- ══════════════════════════════════════════
         REGISTER PANE
    ══════════════════════════════════════════ -->
    <div class="pane active" id="pane-register">
      <div class="row2">
        <div class="field"><label>Full Name <span class="req">*</span></label><input type="text" id="r-name" placeholder="Your name"/></div>
        <div class="field"><label>Date of Birth</label><input type="date" id="r-dob"/></div>
      </div>
      <div class="field"><label>Email <span class="req">*</span></label><input type="email" id="r-email" placeholder="usn@sit.ac.in"/></div>
      <div class="field"><label>Mobile</label><input type="tel" id="r-mobile" placeholder="+91 9876543210"/></div>
      <div class="field"><label>Department</label>
        <select id="r-dept">
          <option value="">Select department</option>
          <option>Computer Science & Engineering</option>
          <option>Information Science & Engineering</option>
          <option>Electronics & Communication</option>
          <option>Electrical & Electronics</option>
          <option>Mechanical Engineering</option>
          <option>Civil Engineering</option>
          <option>Chemical Engineering</option>
          <option>Biotechnology</option>
          <option>MBA</option>
          <option>MCA</option>
        </select>
      </div>
      <div class="field"><label>Role</label>
        <select id="r-role" onchange="toggleRoleField()">
          <option value="student">Student</option>
          <option value="teacher">Teacher / Staff</option>
        </select>
      </div>
      <div class="field"><label>Password <span class="req">*</span></label>
        <div class="pw-wrap">
          <input type="password" id="r-password" placeholder="Min 8 characters"/>
          <button class="pw-eye" onclick="togglePw('r-password')" type="button">
            <svg width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>

      <button class="btn btn-primary" id="btn-register" onclick="handleRegister()">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        Create Account
      </button>

      <div class="divider">then register biometric</div>

      <button class="btn btn-secondary" id="btn-bio-reg" disabled onclick="handleBiometricRegister()">

const API = 'https://script.google.com/macros/s/AKfycbyxaC1CjCDxQLzyk19ADffDazjh9q7NTfB1rVg87YuPWmAhKx7RFMP0opHA9r5RmGjygQ/exec';
             
// ── State ─────────────────────────────────────────────────────
let currentUserId    = null;
let currentUserName  = null;

// ── GPS + reverse geocode ─────────────────────────────────────

// Step 1: Get fine location using GPS (falls back to coarse if GPS unavailable)
// Uses watchPosition to get the BEST reading within a time window, then stops.
function getLocation() {
  return new Promise((resolve) => {
    if (!navigator.geolocation) {
      resolve({ lat:'', lng:'', address:'', accuracy:null });
      return;
    }

    let bestResult  = null;   // best reading collected so far
    let watchId     = null;
    let settled     = false;

    const FINE_ACCURACY_TARGET = 50;   // meters — accept immediately if this good
    const MAX_WAIT_MS          = 9000; // max time to keep trying

    function finish(result) {
      if (settled) return;
      settled = true;
      if (watchId !== null) navigator.geolocation.clearWatch(watchId); // stop tracking
      resolve(result || { lat:'', lng:'', address:'', accuracy:null });
    }

    // watchPosition keeps firing as accuracy improves (GPS lock gets better)
    watchId = navigator.geolocation.watchPosition(
      (pos) => {
        const reading = {
          lat:      pos.coords.latitude,
          lng:      pos.coords.longitude,
          accuracy: pos.coords.accuracy, // meters — lower is better (fine location)
          address:  ''
        };

        // Always keep the most accurate reading we've seen
        if (!bestResult || reading.accuracy < bestResult.accuracy) {
          bestResult = reading;
        }

        // If we've hit fine accuracy target, no need to wait longer
        if (reading.accuracy <= FINE_ACCURACY_TARGET) {
          finish(bestResult);
        }
      },
      (err) => {
        // GPS failed — resolve with best we have (could be coarse/Wi-Fi fix)
        finish(bestResult);
      },
      {
        enableHighAccuracy: true,  // request fine location (GPS)
        timeout:            9000,  // each individual fix attempt timeout
        maximumAge:         0      // never use cached position
      }
    );

    // Hard deadline — use best result collected so far, even if coarse
    setTimeout(() => finish(bestResult), MAX_WAIT_MS);
  });
}

// Step 2: Get location + reverse geocode address
async function getLocationWithAddress() {
  const loc = await getLocation();
  if (!loc.lat) return loc;
  try {
    const url = `https://nominatim.openstreetmap.org/reverse?lat=${loc.lat}&lon=${loc.lng}&format=json`;
    const res = await fetch(url, { headers:{ 'Accept-Language':'en' } });
    const d   = await res.json();
    loc.address = d.display_name ? d.display_name.split(',').slice(0,3).join(',').trim() : '';
  } catch(e) {
    loc.address = '';
  }
  return loc;
}

function showLocBar(state, msg, accuracy) {
  const el = document.getElementById('loc-status-bar');
  if (!el) return;
  const icons = { getting:'📡', ok:'📍', fail:'⚠️' };
  // Show accuracy badge when we have a fix
  const accBadge = (accuracy != null && state === 'ok')
    ? ` <span style="font-size:10px;opacity:.75;margin-left:4px">(±${Math.round(accuracy)}m ${accuracy <= 50 ? '🎯 fine' : '📶 coarse'})</span>`
    : '';
  el.innerHTML = `<div class="loc-bar ${state}">${icons[state]||''} ${msg}${accBadge}</div>`;
}

function showAttendanceCard(data, userId) {

      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/></svg>
      Mark Exit (leaving classroom)
    </button>`;

  // Hide sign-in fields while session is active — keep only the card + exit btn
  ['si-email','si-password'].forEach(id => {

  });

  if (btnSignin) btnSignin.style.display = 'none';
  const btnBio = document.getElementById('btn-bio-signin');
  if (btnBio) btnBio.style.display = 'none';
  const div = document.querySelector('#pane-signin .divider');
  if (div) div.style.display = 'none';
}

// ── Device fingerprint ────────────────────────────────────────
async function getDeviceId() {
  if (deviceId) return deviceId;
  try {
    const stored = localStorage.getItem('bioattend_device_id');
    if (stored) { deviceId = stored; return deviceId; }
  } catch(e) {}
  const canvas = document.createElement('canvas');
  const ctx    = canvas.getContext('2d');
  ctx.textBaseline = 'top'; ctx.font = '14px Arial';
  ctx.fillText('BioAttend-SIT', 2, 2);
  const raw = [
    navigator.userAgent, navigator.language,
    screen.width+'x'+screen.height, screen.colorDepth,
    new Date().getTimezoneOffset(),
    navigator.hardwareConcurrency||'',
    navigator.maxTouchPoints||'',
    canvas.toDataURL().slice(-60)
  ].join('|');
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(raw));
  const hex = Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
  deviceId  = hex.slice(0,16);
  try { localStorage.setItem('bioattend_device_id', deviceId); } catch(e) {}
  return deviceId;
}

// ── API helper ────────────────────────────────────────────────
async function api(payload) {
  const url = API + '?data=' + encodeURIComponent(JSON.stringify(payload));
  const res = await fetch(url, { redirect:'follow' });
  if (!res.ok) throw new Error('HTTP ' + res.status);
  const text = await res.text();
  try { return JSON.parse(text); }
  catch(e) { console.error('Non-JSON:', text); throw new Error('Server error'); }
}

// ── Toast ─────────────────────────────────────────────────────
function toast(msg, type='') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'show '+type;
  clearTimeout(t._t);
  t._t = setTimeout(() => t.className = '', 3500);
}

// ── Loading ───────────────────────────────────────────────────
function setLoading(id, on) {
  const b = document.getElementById(id);
  if (!b) return;
  if (on) { b._html = b.innerHTML; b.innerHTML = '<span class="spin"></span> Please wait…'; b.disabled = true; }
  else    { b.innerHTML = b._html || b.innerHTML; b.disabled = false; }
}

// ── Tabs ──────────────────────────────────────────────────────
function switchTab(tab) {
  ['signin','register','teacher'].forEach(t => {
    document.getElementById('pane-'+t).classList.toggle('active', t===tab);
    document.getElementById('tab-'+t).classList.toggle('active', t===tab);
  });
}

function togglePw(id) {
  const i = document.getElementById(id);
  i.type = i.type === 'password' ? 'text' : 'password';
}

// ── Format time ───────────────────────────────────────────────
function fmtTime(secs) {
  const m = Math.floor(Math.max(0,secs)/60), s = Math.max(0,secs)%60;
  return String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
}

// ══════════════════════════════════════════
// SIGN IN — simple: email+password → mark attendance
// ══════════════════════════════════════════
async function handleSignIn() {
  const email    = document.getElementById('si-email').value.trim();
  const password = document.getElementById('si-password').value;
  if (!email || !password) { toast('Please enter email and password', 'error'); return; }

  setLoading('btn-signin', true);
  try {
    // 1. Sign in
    const auth = await api({ action:'signIn', email, password });
    if (!auth.success) { toast(auth.message, 'error'); setLoading('btn-signin', false); return; }

    // 2. Get location silently in background
    showLocBar('getting', 'Getting your location…');
    const loc = await getLocationWithAddress();
    if (loc.lat) showLocBar('ok', loc.address || `${loc.lat}, ${loc.lng}`, loc.accuracy);
    else showLocBar('fail', 'Location not captured — marked without GPS');

    // 3. Mark attendance with location
    const att = await api({
      action:  'markAttendance',
      userId:  auth.userId,
      method:  'password',
      lat:     loc.lat,
      lng:     loc.lng,
      address: loc.address
    });

    if (att.success) {
      toast('✓ ' + att.message, 'success');
      // Save to sessionStorage so card restores if page refreshes
      try {
        sessionStorage.setItem('bioattend_marked_uid', auth.userId);
        sessionStorage.setItem('bioattend_name',     att.name     || '');
        sessionStorage.setItem('bioattend_date',     att.date     || '');
        sessionStorage.setItem('bioattend_time',     att.time     || '');
        sessionStorage.setItem('bioattend_location', att.location || '');
        sessionStorage.setItem('bioattend_method',   'password');
      } catch(e) {}
      showAttendanceCard({ ...att, method:'password' }, auth.userId);
    } else {
      toast(att.message, 'error');
    }
  } catch(e) { toast('Error: ' + e.message, 'error'); }
  setLoading('btn-signin', false);
}

// ══════════════════════════════════════════
// REGISTER
// ══════════════════════════════════════════
async function handleRegister() {
  const name  = document.getElementById('r-name').value.trim();
  const email = document.getElementById('r-email').value.trim();
  const pass  = document.getElementById('r-password').value;
  const dob   = document.getElementById('r-dob').value;
  const mobile= document.getElementById('r-mobile').value.trim();
  const dept  = document.getElementById('r-dept').value;
  const role  = document.getElementById('r-role').value;

  if (!name || !email || !pass) { toast('Name, email and password are required', 'error'); return; }
  if (pass.length < 8) { toast('Password must be at least 8 characters', 'error'); return; }

  setLoading('btn-register', true);
  try {
    const dId = await getDeviceId();
    const d   = await api({ action:'register', name, email, password:pass, dob, mobile, department:dept, role, deviceId:dId });
    if (d.success) {
      registeredUserId = d.userId;
      toast('✓ Account created! Now register your biometric.', 'success');
      document.getElementById('btn-bio-reg').disabled = false;
      document.getElementById('bio-hint').textContent = 'Tap below to register your fingerprint / Face ID';
      showDeviceBadge(dId);
      // Auto-bind device
      await api({ action:'registerDevice', userId:d.userId, deviceId:dId });
    } else {
      toast(d.message, 'error');
    }
  } catch(e) { toast('Error: ' + e.message, 'error'); }
  setLoading('btn-register', false);
}

// ── Biometric register ────────────────────────────────────────
async function handleBiometricRegister() {
  if (!registeredUserId) { toast('Create account first', 'error'); return; }
  if (!window.PublicKeyCredential) { toast('WebAuthn not supported on this browser', 'error'); return; }
  try {
    const challenge = crypto.getRandomValues(new Uint8Array(32));
    const cred = await navigator.credentials.create({ publicKey: {
      challenge,
      rp:   { name:'BioAttend SIT', id:location.hostname },
      user: {
        id:          Uint8Array.from(registeredUserId, c=>c.charCodeAt(0)),
        name:        document.getElementById('r-email').value,
        displayName: document.getElementById('r-name').value
      },
      pubKeyCredParams:       [{ type:'public-key', alg:-7 }],
      authenticatorSelection: { authenticatorAttachment:'platform', userVerification:'required' },
      timeout: 60000
    }});
    const credId = btoa(String.fromCharCode(...new Uint8Array(cred.rawId)));
    const d = await api({ action:'saveBiometric', userId:registeredUserId, credentialId:credId });
    if (d.success) {
      toast('✓ Biometric registered! You can now sign in with fingerprint.', 'success');
      document.getElementById('bio-hint').textContent = '✓ Biometric saved — ready to use';
    } else {
      toast(d.message, 'error');
    }
  } catch(e) { toast('Biometric error: ' + e.message, 'error'); }
}

// ── Biometric sign in — the main flow ────────────────────────
async function handleBiometricSignIn() {
  if (!window.PublicKeyCredential) { toast('WebAuthn not supported', 'error'); return; }
  const email = document.getElementById('si-email').value.trim();
  if (!email) { toast('Enter your email first, then tap biometric', 'error'); return; }

  try {
    // 1. Get stored credential
    const info = await api({ action:'getBiometric', email });
    if (!info.success || !info.credentialId) {
      toast(info.message || 'No biometric registered for this account', 'error'); return;
    }

    // 2. Prompt fingerprint / Face ID
    const challenge = crypto.getRandomValues(new Uint8Array(32));
    const rawId     = Uint8Array.from(atob(info.credentialId), c=>c.charCodeAt(0));
    await navigator.credentials.get({ publicKey: {
      challenge,
      allowCredentials: [{ type:'public-key', id:rawId }],
      userVerification: 'required',
      timeout:          60000
    }});

    // 3. Get location silently
    showLocBar('getting', 'Getting your location…');
    const loc = await getLocationWithAddress();
    if (loc.lat) showLocBar('ok', loc.address || `${loc.lat}, ${loc.lng}`, loc.accuracy);
    else showLocBar('fail', 'Location not captured — marked without GPS');

    // 4. Mark attendance
    const att = await api({
      action:  'markAttendance',
      userId:  info.userId,
      method:  'biometric',
      lat:     loc.lat,
      lng:     loc.lng,
      address: loc.address
    });

    if (att.success) {
      toast('✓ ' + att.message, 'success');
      try {
        sessionStorage.setItem('bioattend_marked_uid', info.userId);
        sessionStorage.setItem('bioattend_name',     att.name     || '');
        sessionStorage.setItem('bioattend_date',     att.date     || '');
        sessionStorage.setItem('bioattend_time',     att.time     || '');
        sessionStorage.setItem('bioattend_location', att.location || '');
        sessionStorage.setItem('bioattend_method',   'biometric');
      } catch(e) {}
      showAttendanceCard({ ...att, method:'biometric' }, info.userId);
    } else {
      toast(att.message, 'error');
    }
  } catch(e) {
    if (e.name === 'NotAllowedError') toast('Biometric cancelled', 'warn');
    else toast('Biometric error: ' + e.message, 'error');
  }
}

// ── Mark Exit ─────────────────────────────────────────────────
async function handleExit() {
  // Recover userId from sessionStorage if in-memory state was lost
  if (!markedUserId) {
    try { markedUserId = sessionStorage.getItem('bioattend_marked_uid') || null; } catch(e) {}
  }
  if (!markedUserId) { toast('No active attendance session. Sign in first.', 'error'); return; }

  const btn = document.getElementById('btn-exit');
  if (btn) { btn.disabled = true; btn.textContent = 'Getting exit location…'; }

  try {
    showLocBar('getting', 'Getting exit location…');
    const loc = await getLocationWithAddress();
    if (loc.lat) showLocBar('ok', 'Exit: ' + (loc.address || `${loc.lat}, ${loc.lng}`), loc.accuracy);
    else showLocBar('fail', 'Exit location not captured');

    const res = await api({
      action:  'markExit',
      userId:  markedUserId,
      lat:     loc.lat,
      lng:     loc.lng,
      address: loc.address
    });

    if (res.success) {
      toast('✓ ' + res.message, 'success');

      // Update card to show exit info
      const card = document.querySelector('.att-card');
      if (card) {
        card.querySelector('.att-name').textContent = '✓ Entry & Exit Recorded';
        card.innerHTML += `
          <div class="att-row"><span>Exit time</span><span class="att-val">${res.exitTime||''}</span></div>
          <div class="att-row"><span>Duration</span><span class="att-val">${res.duration||''}</span></div>
          <div class="att-row"><span>Exit location</span><span class="att-val" style="max-width:160px;text-align:right;font-size:10.5px">${res.location||'not captured'}</span></div>`;
      }

      // Mark exit button as done
      if (btn) { btn.textContent = '✓ Exit recorded'; btn.style.opacity = '.5'; btn.disabled = true; }

      // Clear session
      markedUserId = null;
      try { sessionStorage.removeItem('bioattend_marked_uid'); } catch(e) {}

      // Show sign-in form again after 3 seconds for next student
      setTimeout(() => restoreSignInForm(), 3000);

    } else {
      toast(res.message, 'error');
      if (btn) {
        btn.disabled = false;
        btn.innerHTML = '<svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/></svg> Mark Exit (leaving classroom)';
      }
    }
  } catch(e) {
    toast('Error: ' + e.message, 'error');
    if (btn) { btn.disabled = false; btn.textContent = 'Mark Exit (leaving classroom)'; }
  }
}

function restoreSignInForm() {
  // Hide success card
  const card = document.getElementById('att-success-card');
  if (card) card.style.display = 'none';
  // Clear location bar
  const loc = document.getElementById('loc-status-bar');
  if (loc) loc.innerHTML = '';
  // Show form fields again
  ['si-email','si-password'].forEach(id => {
    const f = document.getElementById(id);
    if (f && f.closest('.field')) f.closest('.field').style.display = '';
  });
  const btnSignin = document.getElementById('btn-signin');
  if (btnSignin) { btnSignin.style.display = ''; btnSignin.disabled = false; }
  const btnBio = document.getElementById('btn-bio-signin');
  if (btnBio) btnBio.style.display = '';
  const div = document.querySelector('#pane-signin .divider');
  if (div) div.style.display = '';
  // Clear session so next student starts fresh
  try {
    ['bioattend_marked_uid','bioattend_name','bioattend_date',
     'bioattend_time','bioattend_location','bioattend_method'
    ].forEach(k => sessionStorage.removeItem(k));
  } catch(e) {}
  // Clear email/password fields for next student
  const email = document.getElementById('si-email');
  const pass  = document.getElementById('si-password');
  if (email) email.value = '';
  if (pass)  pass.value  = '';
}

// ── Device badge ──────────────────────────────────────────────

  if (ex) ex.remove();
  const badge = document.createElement('div');

  badge.innerHTML = `<svg width="13" height="13" fill="currentColor" viewBox="0 0 24 24"><path d="M17 2H7c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h10c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-5 18c-.55 0-1-.45-1-1s.45-1 1-1 1 .45 1 1-.45 1-1 1zm5-4H7V4h10v12z"/></svg><span>Device bound: <code style="font-family:monospace">${dId}</code></span>`;

// ══════════════════════════════════════════
// TEACHER ADMIN PANEL
// ══════════════════════════════════════════

async function handleTeacherLogin() {
  const email    = document.getElementById('t-email').value.trim();
  const password = document.getElementById('t-password').value;
  if (!email || !password) { toast('Enter email and password', 'error'); return; }
  setLoading('btn-teacher-login', true);
  try {
    const d = await api({ action:'signIn', email, password });
    if (!d.success) { toast(d.message, 'error'); setLoading('btn-teacher-login', false); return; }
    if (d.role !== 'teacher' && d.role !== 'admin') {
      toast('This account is not a teacher account', 'error');
      setLoading('btn-teacher-login', false); return;
    }
    teacherData = d;
    showTeacherDashboard();
  } catch(e) { toast('Error: ' + e.message, 'error'); }
  setLoading('btn-teacher-login', false);
}

function showTeacherDashboard() {
  document.getElementById('teacher-login-section').style.display = 'none';
  document.getElementById('teacher-dashboard').style.display     = 'block';
  document.getElementById('t-welcome').textContent = 'Hello, ' + teacherData.name;
  switchSubTab('session');
  checkActiveForTeacher();
}

function teacherLogout() {
  teacherData = null; clearInterval(sessionTimer); liveSessionId = null;
  document.getElementById('teacher-login-section').style.display = 'block';
  document.getElementById('teacher-dashboard').style.display     = 'none';
  document.getElementById('t-email').value    = '';
  document.getElementById('t-password').value = '';
}

function switchSubTab(tab) {
  ['session','live','history','students'].forEach(t => {
    document.getElementById('sp-'+t).classList.toggle('active', t===tab);
    document.getElementById('stab-'+t).classList.toggle('active', t===tab);
  });
  if (tab==='live')     refreshLive();
  if (tab==='history')  { document.getElementById('hist-date').value = new Date().toISOString().slice(0,10); loadHistory(); }
  if (tab==='students') loadStudents();
}

async function checkActiveForTeacher() {
  try {
    const d    = await api({ action:'getActiveSession' });
    const el   = document.getElementById('active-session-display');
    const form = document.getElementById('open-session-form');
    if (d.active) {
      let secs = d.secondsLeft;
      liveSessionId = activeSessionId = d.session.SessionID;
      el.innerHTML = `
        <div class="session-card" style="margin-bottom:12px">
          <div class="subj" style="font-size:14px">🟢 ${d.session.Subject} — LIVE</div>
          <div class="meta">Closes in <span id="t-timer" style="font-weight:700;color:var(--success)">${fmtTime(secs)}</span></div>
          <button onclick="closeCurrentSession('${d.session.SessionID}')" class="btn btn-danger" style="margin-top:10px;padding:8px">Stop Session Early</button>
        </div>`;
      form.style.display = 'none';
      clearInterval(sessionTimer);
      sessionTimer = setInterval(() => {
        secs--;
        const t = document.getElementById('t-timer');
        if (t) t.textContent = fmtTime(secs);
        if (secs <= 0) { clearInterval(sessionTimer); checkActiveForTeacher(); }
      }, 1000);
    } else {
      liveSessionId = activeSessionId = null;
      el.innerHTML  = ''; form.style.display = 'block';
    }
  } catch(e) {}
}

async function openSession() {
  const subject = document.getElementById('t-subject').value.trim();
  const minutes = document.getElementById('t-window').value;
  if (!subject) { toast('Enter a subject name', 'error'); return; }
  setLoading('btn-open-session', true);
  try {
    const d = await api({ action:'createSession', userId:teacherData.userId, teacherName:teacherData.name, role:teacherData.role, subject, windowMinutes:minutes });
    if (d.success) {
      toast('✓ Session opened — students can mark attendance now', 'success');
      document.getElementById('t-subject').value = '';
      checkActiveForTeacher();
    } else toast(d.message, 'error');
  } catch(e) { toast('Error: ' + e.message, 'error'); }
  setLoading('btn-open-session', false);
}

async function closeCurrentSession(sessionId) {
  try {
    await api({ action:'closeSession', sessionId });
    toast('Session closed', 'success');
    clearInterval(sessionTimer);
    liveSessionId = activeSessionId = null;
    checkActiveForTeacher();
  } catch(e) { toast('Error closing session', 'error'); }
}

async function refreshLive() {
  const listEl  = document.getElementById('live-list');
  const infoEl  = document.getElementById('live-session-info');
  const statsEl = document.getElementById('live-stats');
  const togEl   = document.getElementById('live-toggle-row');
  const refEl   = document.getElementById('live-refresh-row');
  try {
    const chk = await api({ action:'getActiveSession' });
    if (chk.active) liveSessionId = chk.session.SessionID;
  } catch(e) {}
  if (!liveSessionId) {
    infoEl.className = 'no-session'; infoEl.style.display = 'block';
    infoEl.textContent = 'No active session — open one from the Session tab';
    statsEl.style.display='none'; togEl.style.display='none';
    refEl.style.display='none'; listEl.innerHTML=''; return;
  }
  try {
    const d = await api({ action:'getDashboard', sessionId:liveSessionId });
    if (!d.success) { toast(d.message,'error'); return; }
    liveData = d;
    infoEl.style.display='none'; statsEl.style.display='grid';
    togEl.style.display='flex'; refEl.style.display='block';
    document.getElementById('stat-present').textContent = d.presentCount;
    document.getElementById('stat-absent').textContent  = d.absentCount;
    document.getElementById('stat-total').textContent   = d.total;
    const pct = d.total ? Math.round(d.presentCount/d.total*100) : 0;
    document.getElementById('stat-pct').textContent = pct+'%';
    document.getElementById('live-updated').textContent = 'Updated '+new Date().toLocaleTimeString();
    renderLiveList();
  } catch(e) { toast('Error: '+e.message,'error'); }
}

function showLiveTab(tab) {
  liveTab = tab;
  document.getElementById('seg-present').classList.toggle('active', tab==='present');
  document.getElementById('seg-absent').classList.toggle('active', tab==='absent');
  renderLiveList();
}

function renderLiveList() {
  if (!liveData) return;
  const el   = document.getElementById('live-list');
  const list = liveTab==='present' ? liveData.present : liveData.absent;
  if (!list || !list.length) {
    el.innerHTML = `<div style="text-align:center;color:var(--muted);padding:20px;font-size:12px">${liveTab==='present'?'No one has marked yet':'Everyone is present! 🎉'}</div>`;
    return;
  }
  el.innerHTML = list.map((s,i) => liveTab==='present'
    ? `<div class="att-item"><div><div class="name">${i+1}. ${s.name}</div><div class="meta">${s.email}<br>${s.department||'—'} · ${s.time} · ${s.method}</div></div><span class="att-badge" style="background:rgba(34,197,94,.15);color:var(--success);border-color:rgba(34,197,94,.3)">✓</span></div>`
    : `<div class="att-item"><div><div class="name">${i+1}. ${s.name}</div><div class="meta">${s.email} · ${s.department||'—'}</div></div><span class="att-badge" style="background:rgba(239,68,68,.15);color:var(--danger);border-color:rgba(239,68,68,.3)">✗</span></div>`
  ).join('');
}

function exportCurrentSession() {
  if (!liveData) return;
  const rows=[['Name','Email','Department','Time','Method','Status']];
  liveData.present.forEach(s=>rows.push([s.name,s.email,s.department||'',s.time,s.method,'Present']));
  liveData.absent.forEach(s=>rows.push([s.name,s.email,s.department||'','','','Absent']));
  downloadCSV(rows,'attendance_live.csv');
}

async function loadHistory() {
  const date = document.getElementById('hist-date').value;
  const el   = document.getElementById('history-list');
  el.innerHTML = '<div style="text-align:center;color:var(--muted);font-size:12px;padding:16px">Loading…</div>';
  try {
    const d = await api({ action:'getSessions', userId:teacherData.userId });
    let sessions = d.sessions || [];
    if (date) sessions = sessions.filter(s=>s.Date===date);
    historyData = sessions;
    if (!sessions.length) {
      el.innerHTML='<div style="text-align:center;color:var(--muted);font-size:12px;padding:16px">No sessions found</div>';
      document.getElementById('hist-export-row').style.display='none'; return;
    }
    document.getElementById('hist-export-row').style.display='block';
    el.innerHTML = sessions.map(s=>`
      <div class="att-item" style="cursor:pointer;flex-direction:column;align-items:stretch" onclick="toggleSessionDetail('${s.SessionID}','${(s.Subject||'').replace(/'/g,"\\'")}')">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <div><div class="name">${s.Subject}</div><div class="meta">${s.Date} · ${s.StartTime}–${s.EndTime}</div></div>
          <div style="text-align:right"><span class="att-badge">${s.presentCount||0} present</span><div style="font-size:10px;margin-top:3px;color:${s.Status==='open'?'var(--success)':'var(--muted)'}">${s.Status}</div></div>
        </div>
        <div id="detail-${s.SessionID}" style="display:none;margin-top:10px;border-top:1px solid var(--border);padding-top:10px"></div>
      </div>`).join('');
  } catch(e) { toast('Error: '+e.message,'error'); }
}

async function toggleSessionDetail(sessionId, subject) {
  const el = document.getElementById('detail-'+sessionId);
  if (!el) return;
  if (el.style.display==='block') { el.style.display='none'; return; }
  el.style.display='block';
  el.innerHTML='<div style="color:var(--muted);font-size:11px">Loading…</div>';
  try {
    const d = await api({ action:'getDashboard', sessionId });
    if (!d.success) { el.innerHTML='<div style="color:var(--danger);font-size:11px">'+d.message+'</div>'; return; }
    el.innerHTML=`
      <div style="display:flex;gap:12px;margin-bottom:8px;font-size:11px">
        <span style="color:var(--success)">✓ ${d.presentCount} present</span>
        <span style="color:var(--danger)">✗ ${d.absentCount} absent</span>
        <span style="color:var(--muted)">${d.total} total · ${d.total?Math.round(d.presentCount/d.total*100):0}%</span>
      </div>
      ${d.present.map(s=>`<div style="font-size:11px;padding:3px 0;border-bottom:1px solid var(--border);color:var(--text)">${s.name} <span style="color:var(--muted)">${s.time} · ${s.method}</span></div>`).join('')}
      ${!d.present.length?'<div style="font-size:11px;color:var(--muted)">No students marked</div>':''}
      <button onclick="event.stopPropagation();exportOneSession('${sessionId}','${subject}')" class="export-btn" style="float:none;margin-top:10px">Export CSV</button>`;
  } catch(e) { el.innerHTML='<div style="color:var(--danger);font-size:11px">Error</div>'; }
}

async function exportOneSession(sessionId, subject) {
  try {
    const d = await api({ action:'exportAttendance', sessionId });
    if (d.success) downloadCSV(null,'attendance_'+(subject||'export').replace(/\s+/g,'_')+'.csv',d.csv);
    else toast(d.message,'error');
  } catch(e) { toast('Export failed','error'); }
}

async function exportHistory() {
  if (!historyData.length) return;
  try {
    const date = historyData[0]?.Date || '';
    const d = await api({ action:'exportAttendance', date });
    if (d.success) downloadCSV(null,'attendance_'+date+'.csv',d.csv);
    else toast(d.message,'error');
  } catch(e) { toast('Export failed','error'); }
}

async function loadStudents() {
  const el = document.getElementById('students-list');
  el.innerHTML='<div style="text-align:center;color:var(--muted);font-size:12px;padding:16px">Loading…</div>';
  try {
    const d = await api({ action:'getStudents' });
    allStudents = d.students || [];
    document.getElementById('student-count').textContent = allStudents.length+' students registered';
    renderStudents(allStudents);
  } catch(e) { toast('Error loading students','error'); }
}

function filterStudents() {
  const q = document.getElementById('student-search').value.toLowerCase();
  const f = allStudents.filter(s=>(s.FullName||'').toLowerCase().includes(q)||(s.Email||'').toLowerCase().includes(q)||(s.Department||'').toLowerCase().includes(q));
  document.getElementById('student-count').textContent = f.length+' of '+allStudents.length+' students';
  renderStudents(f);
}

function renderStudents(list) {
  const el = document.getElementById('students-list');
  if (!list.length) { el.innerHTML='<div style="text-align:center;color:var(--muted);font-size:12px;padding:16px">No students found</div>'; return; }
  el.innerHTML = list.map((s,i)=>`
    <div class="att-item">
      <div>
        <div class="name">${i+1}. ${s.FullName}</div>
        <div class="meta">${s.Email}<br>${s.Department||'No dept'}</div>
      </div>
      <div style="text-align:right;font-size:10px;line-height:1.8">
        <span style="color:${s.DeviceId?'var(--success)':'var(--muted)'}">${s.DeviceId?'📱 bound':'📱 none'}</span><br>
        <span style="color:${s.BiometricCredentialId?'var(--success)':'var(--muted)'}">${s.BiometricCredentialId?'🔐 bio':'🔐 none'}</span>
      </div>
    </div>`).join('');
}

function downloadCSV(rows, filename, csvString) {
  const content = csvString || rows.map(r=>r.map(c=>'"'+(c||'')+'"').join(',')).join('\n');
  const blob = new Blob([content],{type:'text/csv'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob); a.download = filename; a.click();
}

// ── Init ──────────────────────────────────────────────────────
switchTab('signin');

// If student already marked attendance in this browser session, show the card
try {
  const savedUid = sessionStorage.getItem('bioattend_marked_uid');
  if (savedUid) {
    markedUserId = savedUid;
    showAttendanceCard({
      name:     sessionStorage.getItem('bioattend_name')     || '',
      date:     sessionStorage.getItem('bioattend_date')     || new Date().toISOString().slice(0,10),
      time:     sessionStorage.getItem('bioattend_time')     || '',
      location: sessionStorage.getItem('bioattend_location') || '',
      method:   sessionStorage.getItem('bioattend_method')   || ''
    }, savedUid);
  }
} catch(e) {}
</script>
